<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnavox Odyssey² Arcade</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0b0b0b; display: flex;
            justify-content: center; align-items: center; overflow: hidden;
        }
        #emulator-container {
            width: 100%; height: 100%; max-width: 800px; max-height: 600px;
            background-color: #000; border: 3px solid #222; border-radius: 6px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.7);
        }
        #emulator-container div {
            width: 100% !important; height: 100% !important;
        }
    </style>
</head>
<body>

    <div id="emulator-container">
        <div id="game"></div>
    </div>

    <script>
        EJS_player = '#game';
        EJS_gameUrl = 'mygame.bin'; 
        
        // This maps your local o2rom.bin directly to the required system folder
        EJS_biosUrl = 'o2rom.bin';  
        
        EJS_gameSystem = 'odyssey2'; 
        EJS_core = 'o2em';          
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/'; 
        
        EJS_startOnLoaded = false; 
        EJS_autoplay = false;

        // Force EmulatorJS to load the system BIOS explicitly into the virtual filesystem
        EJS_biosName = 'o2rom.bin';
    </script>
    
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

</body>
</html>
