<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnavox Odyssey² Arcade</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050505; display: flex;
            justify-content: center; align-items: center; overflow: hidden;
        }
        iframe {
            width: 100%; height: 100%; max-width: 960px; max-height: 720px;
            border: 4px solid #222; border-radius: 8px; box-shadow: 0px 10px 30px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

    <iframe id="arcade-frame" allow="autoplay; gamepad" src=""></iframe>

    <script>
        // Find exactly where your GitHub page is running
        const repoUrl = window.location.origin + window.location.pathname.replace('index.html', '');
        
        const gameFile = repoUrl + 'mygame.bin';
        const biosFile = repoUrl + 'o2rom.bin';

        // Direct injection into an open web-emulation wrapper that supports O2EM
        document.getElementById('arcade-frame').src = 
            `https://gama.one/retroarch-web/?core=o2em&rom=${encodeURIComponent(gameFile)}&bios=${encodeURIComponent(biosFile)}`;
    </script>

</body>
</html>
