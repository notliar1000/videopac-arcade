<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odyssey² Online Player</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
        }
        #game-container {
            width: 100%;
            height: 100%;
            max-width: 800px; /* Limits size on ultra-wide screens */
            max-height: 600px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="emulator"></div>
    </div>

    <script>
        // Emulator configuration
        EJS_player = '#emulator';
        EJS_core = 'o2em'; // Tells EmulatorJS to use the O2EM core
        
        // Paths to your repository files (relative paths work perfectly on GitHub Pages)
        EJS_gameUrl = 'mygame.bin'; 
        EJS_biosUrl = 'o2rom.bin';
        
        // Path to the CDN hosting the emulator engine files
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
    </script>
    
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

</body>
</html>
