<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnavox Odyssey² Arcade</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0b0b0b; display: flex;
            justify-content: center; align-items: center; overflow: hidden;
        }
        #emulator-container {
            width: 100%; height: 100%; max-width: 800px; max-height: 600px;
            background-color: #000; border: 3px solid #222; border-radius: 6px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.7);
        }
        #emulator-container div {
            width: 100% !important; height: 100% !important;
        }
    </style>
    <!-- Include JSZip so we can bundle the BIOS files on the fly in the browser -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

    <div id="emulator-container">
        <div id="game"></div>
    </div>

    <script>
        const path = window.location.origin + window.location.pathname.replace('index.html', '');

        // 1. Download both BIOS files silently in the background
        async function prepareBiosAndStart() {
            try {
                const [o2romRes, g7400Res] = await Promise.all([
                    fetch(path + 'o2rom.bin'),
                    fetch(path + 'g7400.bin')
                ]);

                if (!o2romRes.ok || !g7400Res.ok) {
                    throw new Error("Could not download BIOS files from repository.");
                }

                const o2romBlob = await o2romRes.blob();
                const g7400Blob = await g7400Res.blob();

                // 2. Packaging them into the virtual "odyssey2.zip" required by the core
                const zip = new JSZip();
                zip.file("o2rom.bin", o2romBlob);
                zip.file("g7400.bin", g7400Blob);

                const zippedBios = await zip.generateAsync({ type: "blob" });
                const biosObjectURL = URL.createObjectURL(zippedBios);

                // 3. Initialize EmulatorJS with our dynamically created BIOS ZIP
                EJS_player = '#game';
                EJS_gameUrl = path + 'mygame.bin'; 
                EJS_gameSystem = 'odyssey2'; 
                EJS_core = 'o2em';          
                EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/'; 
                
                EJS_startOnLoaded = false; 
                EJS_autoplay = false;

                // Point the BIOS URL to the memory-generated ZIP file
                EJS_biosUrl = biosObjectURL;

                // Load the main EmulatorJS bootloader to start the game window
                const loaderScript = document.createElement('script');
                loaderScript.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
                document.body.appendChild(loaderScript);

            } catch (err) {
                console.error("BIOS Virtual Packaging Failed: ", err);
            }
        }

        // Run the script
        prepareBiosAndStart();
    </script>

</body>
</html>
