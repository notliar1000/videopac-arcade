<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnavox Odyssey² Arcade</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #111; display: flex;
            justify-content: center; align-items: center; overflow: hidden;
        }
        canvas {
            width: 100%; height: 100%; max-width: 800px; max-height: 600px;
            background-color: #000; image-rendering: pixelated;
        }
    </style>
</head>
<body>

    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script>
        // Setup configuration for the local emulator core
        var Module = {
            noInitialRun: false,
            arguments: ["/mygame.bin"], 
            canvas: document.getElementById('canvas'),
            preRun: [function() {
                // Read files natively from your own GitHub root directory
                FS.createPreloadedFile('/', 'mygame.bin', 'mygame.bin', true, false);
                FS.mkdir('/system');
                FS.createPreloadedFile('/system', 'o2rom.bin', 'o2rom.bin', true, false);
            }]
        };
    </script>
    <script async src="cores/o2em_libretro.js"></script>
</body>
</html>
