<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnavox Odyssey² Arcade</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #0c0c0c; display: flex;
            justify-content: center; align-items: center; overflow: hidden;
        }
        iframe {
            width: 100%; height: 100%; max-width: 960px; max-height: 720px;
            border: 2px solid #333; box-shadow: 0px 0px 20px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <iframe id="retroarch-frame" allow="autoplay; gamepad" src=""></iframe>

    <script>
        // Pinpoint your files on GitHub Pages automatically
        const baseUrl = window.location.origin + window.location.pathname.replace('index.html', '');
        
        const gameUrl = encodeURIComponent(baseUrl + 'mygame.bin');
        const biosUrl = encodeURIComponent(baseUrl + 'o2rom.bin');

        // Points straight to official RetroArch web infrastructure built specifically for this
        document.getElementById('retroarch-frame').src = 
            `https://web.libretro.com/?core=o2em&rom=${gameUrl}&bios=${biosUrl}`;
    </script>

</body>
</html>
